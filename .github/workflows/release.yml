name: Release

# Publish binaries when a version tag is pushed, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload release binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: hacker-news-tui
          target: ${{ matrix.target }}
          # Archive named e.g. hacker-news-tui-aarch64-apple-darwin.tar.gz (.zip on Windows).
          archive: $bin-$target
          # Emit a SHA-256 checksum alongside each archive.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
