name: Release

# Publish a full release when a version tag is pushed, e.g. `git tag v0.1.2 && git push --tags`.
# A tag push runs four jobs end to end:
#   create-release  -> publish the GitHub Release
#   upload          -> build and attach the per-target binaries + checksums
#   publish-crate   -> `cargo publish` to crates.io (OIDC Trusted Publishing — no stored token)
#   homebrew-bump   -> bump the formula in danfry1/homebrew-tap from the release checksums
#
# One-time setup:
#   * crates.io Trusted Publishing: on the crate's Settings -> Trusted Publishing, add
#       Repository owner = danfry1, Repository = hacker-news-tui, Workflow = release.yml.
#     This lets `publish-crate` mint a short-lived token via OIDC; no CARGO_REGISTRY_TOKEN
#     secret is stored anywhere.
#   * Secret HOMEBREW_TAP_TOKEN: a fine-grained PAT with contents:write on danfry1/homebrew-tap
#     (the default GITHUB_TOKEN cannot push to a different repository).
#
# Supply-chain hardening: every action is pinned to a full commit SHA (a moving tag like
# `@v1` could be repointed at malicious code); permissions are least-privilege per job.
on:
  push:
    tags:
      - "v*"

# Default to read-only; each job opts in to exactly the scopes it needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the GitHub Release once, up front, so the matrix uploads have a
  # release to attach to (the upload action does not create one itself).
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # upload release assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload release binary
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: hacker-news-tui
          target: ${{ matrix.target }}
          # Archive named e.g. hacker-news-tui-aarch64-apple-darwin.tar.gz (.zip on Windows).
          archive: $bin-$target
          # Emit a SHA-256 checksum alongside each archive.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish the crate to crates.io via OIDC Trusted Publishing: the auth action
  # exchanges the job's OIDC identity for a short-lived, crate-scoped token, so
  # no long-lived registry secret is stored. Uses the committed Cargo.lock for a
  # reproducible, fully-locked publish.
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the short-lived crates.io token via OIDC
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Bump the hand-written, multi-platform Homebrew formula in the tap. The
  # archive checksums are read straight from this release's `.sha256` assets,
  # so the formula can never drift from what was actually published.
  homebrew-bump:
    name: Bump Homebrew formula
    needs: upload
    runs-on: ubuntu-latest
    permissions:
      contents: read # read this release's assets; the push uses HOMEBREW_TAP_TOKEN
    steps:
      - name: Check out the tap
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: danfry1/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update the formula from the release checksums
        env:
          # Pass the tag through the environment rather than inlining it into the
          # script, so a crafted ref can never be interpreted as shell.
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"

          # Pull the published checksums straight from this release.
          gh release download "$TAG" --repo "$REPO" --pattern '*.sha256' --dir shas
          sha() { awk '{print $1}' "shas/hacker-news-tui-$1.sha256"; }
          mac=$(sha aarch64-apple-darwin)
          lx64=$(sha x86_64-unknown-linux-gnu)
          larm=$(sha aarch64-unknown-linux-gnu)

          # Rewrite the version line, bump the tag in each download URL, and swap
          # each sha256 in based on the archive named in the url line above it.
          formula=tap/hacker-news-tui.rb
          awk -v ver="$version" -v mac="$mac" -v lx64="$lx64" -v larm="$larm" '
            /^  version / { print "  version \"" ver "\""; next }
            /url "/ {
              gsub(/download\/v[0-9.]+\//, "download/v" ver "/")
              if      ($0 ~ /aarch64-apple-darwin/)      pend = mac
              else if ($0 ~ /x86_64-unknown-linux-gnu/)  pend = lx64
              else if ($0 ~ /aarch64-unknown-linux-gnu/) pend = larm
              print; next
            }
            /sha256 "/ && pend != "" {
              sub(/sha256 "[^"]*"/, "sha256 \"" pend "\"")
              print; pend = ""; next
            }
            { print }
          ' "$formula" > "$formula.new"
          mv "$formula.new" "$formula"

          echo "--- updated formula ---"
          cat "$formula"

      - name: Commit and push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Update hacker-news-tui to ${TAG#v}"
          git push
